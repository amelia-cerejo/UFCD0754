      function renderProjetoFinalMoodleHtml(){return cardStart(colors.lightBlue)+'<p style="margin:0 0 8px;color:'+colors.darkBlue+';font-size:12px;font-weight:900;text-transform:uppercase;">Tarefas Individuais</p><h3 style="margin:0;color:'+colors.blue+';font-size:28px;line-height:1.16;font-weight:900;">Percurso pr&aacute;tico - Bem-vindo ao Word</h3><p style="margin:12px 0 0;max-width:820px;font-size:15px;line-height:1.6;">A partir da TI2, cada tarefa parte do ficheiro anterior e origina uma nova vers&atilde;o do exerc&iacute;cio &laquo;Bem-vindo ao Word&raquo;. As vers&otilde;es ficam guardadas na Drive at&eacute; ao documento edit&aacute;vel e ao PDF finais.</p><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px;"><div style="border-left:4px solid '+colors.blue+';background:'+colors.softBlue+';padding:12px;"><strong>Ficheiros</strong><br>Vers&otilde;es na Drive</div><div style="border-left:4px solid '+colors.blue+';background:'+colors.softBlue+';padding:12px;"><strong>Nomenclatura</strong><br>2026-07_01, 2026-07_02...</div><div style="border-left:4px solid '+colors.blue+';background:'+colors.softBlue+';padding:12px;"><strong>Resultado final</strong><br>Documento edit&aacute;vel e PDF</div></div>'+cardEnd()}
      function renderEPortfoliosMoodleHtml(){return cardStart(colors.darkBlue)+'<p style="margin:0 0 8px;color:'+colors.darkBlue+';font-size:12px;font-weight:900;text-transform:uppercase;">A&ccedil;&atilde;o 26109</p><h3 style="margin:0;color:'+colors.blue+';font-size:28px;line-height:1.16;font-weight:900;">E-Portef&oacute;lios da turma</h3><p style="margin:12px 0 0;max-width:820px;font-size:15px;line-height:1.6;">Espa&ccedil;o para publicar as liga&ccedil;&otilde;es finais dos trabalhos/e-portef&oacute;lios dos formandos, quando estiverem dispon&iacute;veis.</p><div style="margin-top:16px;padding:16px;border:1px dashed '+colors.line+';border-radius:8px;background:'+colors.softBlue+';">Substituir este bloco pelos iframes ou liga&ccedil;&otilde;es finais de cada formando/a.</div>'+cardEnd()}
      function renderTgOverviewHtml(){return '<div style="max-width:1100px;margin:0 auto 24px;font-family:Segoe UI,Aptos,Calibri,sans-serif;color:'+colors.text+';"><a style="display:block;color:inherit;text-decoration:none;" href="'+moodleLinks.glossary+'"><div style="position:relative;overflow:hidden;border:1px solid '+colors.line+';border-radius:8px;background:'+colors.white+';box-shadow:0 10px 24px rgba(43,87,154,.07);"><div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px;padding:28px 30px 34px;"><div><h3 style="margin:0;color:'+colors.blue+';font-size:28px;line-height:1.16;font-weight:900;">Gloss&aacute;rio colaborativo</h3><p style="margin:12px 0 0;max-width:760px;font-size:15px;line-height:1.6;">Construir, em grupo, um gloss&aacute;rio com os principais conceitos trabalhados ao longo da UFCD.</p></div><div style="display:grid;place-items:center;width:64px;min-width:64px;height:64px;border:1px solid '+colors.line+';border-radius:8px;background:'+colors.softBlue+';color:'+colors.darkBlue+';font-size:30px;font-weight:900;">TG</div></div><div style="position:absolute;left:0;right:0;bottom:0;height:7px;background:linear-gradient(90deg,'+colors.blue+','+colors.lightBlue+','+colors.darkBlue+');"></div></div></a><div style="margin-top:14px;padding:18px 20px;border:1px solid '+colors.line+';border-radius:8px;background:'+colors.white+';box-shadow:0 10px 24px rgba(43,87,154,.07);font-size:15px;"><p style="margin:0 0 12px;line-height:1.6;"><strong>Objetivo:</strong> criar uma defini&ccedil;&atilde;o simples e um exemplo pr&aacute;tico para a palavra atribu&iacute;da &agrave; sala.</p><ol style="margin:0;padding-left:42px;line-height:1.65;"><li>Ler a palavra atribu&iacute;da.</li><li>Conversar sobre o seu significado.</li><li>Escrever uma defini&ccedil;&atilde;o simples, com as vossas palavras.</li><li>Dar um exemplo pr&aacute;tico, sempre que poss&iacute;vel.</li><li>Publicar a palavra e a defini&ccedil;&atilde;o no Gloss&aacute;rio do Moodle.</li></ol></div></div>'}
      function renderTgDayHtml(task){return cardStart(colors.lightBlue)+'<p style="margin:0 0 8px;color:'+colors.darkBlue+';font-size:12px;font-weight:900;text-transform:uppercase;">Tarefa de Grupo</p><h3 style="margin:0 0 16px;color:'+colors.blue+';font-size:24px;line-height:1.2;font-weight:900;">'+task.title+'</h3><table style="width:100%;border-collapse:collapse;overflow:hidden;border:1px solid '+colors.line+';border-radius:8px;font-size:15px;"><thead><tr><th style="width:28%;padding:12px;text-align:left;color:#fff;background:'+colors.blue+';">Grupo</th><th style="padding:12px;text-align:left;color:#fff;background:'+colors.blue+';">Palavra / Termo</th></tr></thead><tbody>'+task.words.map(([room,word])=>'<tr><td style="padding:12px;border-top:1px solid '+colors.line+';background:'+colors.softBlue+';font-weight:900;">'+room+'</td><td style="padding:12px;border-top:1px solid '+colors.line+';">'+word+'</td></tr>').join('')+'</tbody></table>'+cardEnd()}
      function renderTiOverviewHtml(){return '<div style="max-width:1100px;margin:0 auto 24px;font-family:Segoe UI,Aptos,Calibri,sans-serif;color:'+colors.text+';"><a style="display:block;color:inherit;text-decoration:none;" href="'+moodleLinks.forum1+'"><div style="position:relative;overflow:hidden;border:1px solid '+colors.line+';border-radius:8px;background:'+colors.white+';box-shadow:0 10px 24px rgba(43,87,154,.07);"><div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px;padding:28px 30px 34px;"><div><h3 style="margin:0;color:'+colors.blue+';font-size:28px;line-height:1.16;font-weight:900;">F&oacute;rum de atividades</h3><p style="margin:12px 0 0;max-width:760px;font-size:15px;line-height:1.6;">F&oacute;rum dedicado &agrave;s tarefas, organizado por t&oacute;picos tem&aacute;ticos.</p></div><div style="display:grid;place-items:center;width:64px;min-width:64px;height:64px;border:1px solid '+colors.line+';border-radius:8px;background:'+colors.softOrange+';color:'+colors.darkBlue+';font-size:30px;font-weight:900;">TI</div></div><div style="position:absolute;left:0;right:0;bottom:0;height:7px;background:linear-gradient(90deg,'+colors.blue+','+colors.lightBlue+','+colors.darkBlue+');"></div></div></a><div style="margin-top:14px;padding:18px 20px;border:1px solid '+colors.line+';border-radius:8px;background:'+colors.white+';box-shadow:0 10px 24px rgba(43,87,154,.07);font-size:15px;"><p style="margin:0 0 12px;line-height:1.6;">Cada t&oacute;pico corresponde a um tema da UFCD e inclui a respetiva atividade individual.</p><ol style="margin:0;padding-left:42px;line-height:1.65;"><li>L&ecirc; o enunciado com aten&ccedil;&atilde;o antes de come&ccedil;ar.</li><li>Resolve a tarefa de forma aut&oacute;noma.</li><li>Organiza a resposta de forma clara e completa.</li><li>Sempre que fizer sentido, aplica exemplos pr&aacute;ticos relacionados com a forma&ccedil;&atilde;o.</li><li>Rev&ecirc; o trabalho antes de submeter ou publicar a resposta no Moodle.</li></ol></div></div>'}
      function renderTiHtml(task,index){const accent=index<6?colors.lightBlue:colors.darkBlue;return cardStart(accent)+'<h3 style="margin:0 0 12px;color:'+colors.blue+';font-size:24px;line-height:1.2;font-weight:900;">'+task.title+'</h3><p style="margin:0 0 14px;line-height:1.6;"><strong>Objetivo:</strong> '+task.objective+'</p><p style="margin:0 0 8px;font-weight:900;color:'+colors.darkBlue+';">O que fazer:</p><ul style="margin:0 0 14px;padding-left:22px;line-height:1.7;">'+task.steps.map(step=>'<li>'+step+'</li>').join('')+'</ul><p style="margin:0;padding:12px 14px;border-radius:8px;background:'+colors.softOrange+';border:1px solid '+colors.line+';"><strong>Entrega:</strong> '+task.delivery+'</p>'+cardEnd()}
      function escapeHtml(value){return value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      const templates=[{title:'P&aacute;gina de apoio - cart&atilde;o da sec&ccedil;&atilde;o',description:'Cart&atilde;o para abrir a p&aacute;gina de apoio da UFCD no Moodle.',html:renderPageCardHtml()},{title:'P&aacute;gina de apoio - conte&uacute;do da p&aacute;gina',description:'Iframe para colocar dentro da p&aacute;gina Moodle.',html:renderPageIframeHtml()},{title:'Brainstorming - Mentimeter incorporado',description:'Iframe do Mentimeter fornecido.',html:renderMentimeterHtml()},{title:'Percurso pr&aacute;tico: Bem-vindo ao Word',description:'Bloco Moodle com orienta&ccedil;&otilde;es do percurso pr&aacute;tico das TI.',html:renderProjetoFinalMoodleHtml()},{title:'TG - Gloss&aacute;rio colaborativo',description:'Bloco geral para a tarefa de grupo no Gloss&aacute;rio Moodle.',html:renderTgOverviewHtml()},...tgTasks.map(task=>({title:'TG - '+task.title,description:'Tabela de palavras por grupo.',html:renderTgDayHtml(task)})),{title:'TI - F&oacute;rum de tarefas individuais',description:'Bloco geral para apresentar o f&oacute;rum das tarefas individuais.',html:renderTiOverviewHtml()},...tiTasks.map((task,index)=>({title:task.title,description:'HTML para o t&oacute;pico Moodle da tarefa individual.',html:renderTiHtml(task,index)}))];
      function renderTemplates(){const root=document.getElementById('templates');root.innerHTML=templates.map((template,index)=>'<article class="template-card"><div class="template-head"><div><h2>'+(index+1)+'. '+template.title+'</h2><p>'+template.description+'</p></div><button class="copy-button" type="button" data-copy="'+index+'">Copiar HTML</button></div><div class="template-body"><div class="preview" aria-label="Pr&eacute;-visualiza&ccedil;&atilde;o">'+template.html+'</div><div class="code-panel"><textarea spellcheck="false" aria-label="C&oacute;digo HTML do modelo '+template.title+'">'+escapeHtml(template.html)+'</textarea></div></div></article>').join('')}
      async function copyTemplate(index,button){const html=templates[index].html;try{await navigator.clipboard.writeText(html);button.textContent='Copiado';setTimeout(()=>{button.textContent='Copiar HTML'},1600)}catch(error){const textarea=button.closest('.template-card').querySelector('textarea');textarea.focus();textarea.select();button.textContent='Selecionado'}}
      renderTemplates();document.addEventListener('click',event=>{const button=event.target.closest('[data-copy]');if(!button)return;copyTemplate(Number(button.dataset.copy),button)});
    </script>
